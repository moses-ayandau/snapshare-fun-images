name: SnapShare Blue-Green CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: snapshare
  ECS_CLUSTER: dev-SnapShare
  ECS_SERVICE: snapshare-service
  CONTAINER_NAME: snapshare-app
  DEPLOYMENT_GROUP: snapshare-deployment-group
  APPLICATION_NAME: snapshare-application

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition --task-definition snapshare-task --query taskDefinition > task-definition.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Create AppSpec file for CodeDeploy
        run: |
          cat > appspec.yaml << EOL
          version: 0.0
          Resources:
            - TargetService:
                Type: AWS::ECS::Service
                Properties:
                  TaskDefinition: "${{ steps.task-def.outputs.task-definition }}"
                  LoadBalancerInfo:
                    ContainerName: "${{ env.CONTAINER_NAME }}"
                    ContainerPort: 80
                  PlatformVersion: "LATEST"
          Hooks:
            - BeforeAllowTraffic: "LambdaFunctionToValidateBeforeTrafficShift"
            - AfterAllowTraffic: "LambdaFunctionToValidateAfterTrafficShift"
          EOL

      # ✅ New Step: Validate AppSpec file before deployment
      - name: Validate AppSpec file
        run: |
          cat appspec.yaml
          yamllint appspec.yaml || exit 1

      - name: Deploy with CodeDeploy
        id: deploy
        run: |
          set -e  # Enable exit on failure
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name ${{ env.APPLICATION_NAME }} \
            --deployment-group-name ${{ env.DEPLOYMENT_GROUP }} \
            --revision revisionType=AppSpecContent,appSpecContent="{content='$(cat appspec.yaml | base64 -w 0)'}" \
            --description "Deployment via GitHub Actions" \
            --output json | jq -r '.deploymentId')

          echo "Deployment ID: $DEPLOYMENT_ID"
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT

          # ✅ New Step: Wait for deployment to complete and check status
          aws deploy wait deployment-successful --deployment-id $DEPLOYMENT_ID

      # ✅ New Step: Log ECS service status after deployment
      - name: Check ECS service status
        run: |
          aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.ECS_SERVICE }} \
          --query 'services[0].deployments' --output json

      # ✅ New Step: Automatic rollback if deployment fails
      - name: Rollback on Failure
        if: failure()
        run: |
          set -e
          STATUS=$(aws deploy get-deployment --deployment-id $DEPLOYMENT_ID | jq -r '.deploymentInfo.status')
          if [ "$STATUS" != "Succeeded" ]; then
            echo "Deployment failed! Initiating rollback..."
            aws deploy rollback-deployment --deployment-id $DEPLOYMENT_ID
          fi

  infrastructure:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy VPC CloudFormation stack
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/vpc.yml \
            --stack-name snapshare-vpc \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides EnvironmentName=dev

      - name: Deploy Blue-Green Infrastructure
        run: |
          aws cloudformation deploy \
            --template-file infrastructure/blue-green.yml \
            --stack-name snapshare-blue-green \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              EnvironmentName=dev \
              VpcStackName=snapshare-vpc \
              ServiceName=snapshare-service \
              ContainerName=${{ env.CONTAINER_NAME }} \
              ContainerPort=80 \
              EcsClusterName=${{ env.ECS_CLUSTER }} \
              ApplicationName=${{ env.APPLICATION_NAME }} \
              DeploymentGroupName=${{ env.DEPLOYMENT_GROUP }}
